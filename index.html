<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Security System PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: radial-gradient(circle at top, #0f172a, #000);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:950px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,255,255,0.25);
}

h1{
    text-align:center;
    margin-bottom:15px;
    color:#00f7ff;
    letter-spacing:3px;
}

.videoBox{
    position:relative;
    width:100%;
}

video{
    width:100%;
    border-radius:15px;
    border:2px solid #00f7ff;
    box-shadow: 0 0 25px #00f7ff;
}

canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.status{
    margin-top:15px;
    text-align:center;
    font-size:20px;
    padding:10px;
    border-radius:10px;
    background: rgba(0,0,0,0.5);
    transition:0.3s;
}

.safe{ color:#00ff88; }
.danger{ color:#ff004c; animation: blink 0.4s infinite alternate; }

@keyframes blink{
    from{opacity:1;}
    to{opacity:0.3;}
}

button{
    margin-top:10px;
    padding:12px;
    width:48%;
    border:none;
    border-radius:10px;
    background:#00f7ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
}

button:hover{
    transform:scale(1.05);
    box-shadow: 0 0 20px rgba(0,255,255,0.6);
}

.dangerBtn{
    background:#ff004c;
    color:white;
}

#logBox{
    margin-top:10px;
    max-height:150px;
    overflow:auto;
    font-size:12px;
    background:rgba(0,0,0,0.4);
    padding:10px;
    border-radius:10px;
}
</style>

</head>
<body>

<div class="container">

<h1>AI SECURITY SYSTEM PRO</h1>

<div class="videoBox">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div id="status" class="status safe">SYSTEM STATUS: READY</div>

<div style="display:flex; gap:10px;">
    <button onclick="startSystem()">START SYSTEM</button>
    <button class="dangerBtn" onclick="stopSystem()">STOP SYSTEM</button>
</div>

<div id="logBox"><b>EVENT LOG:</b></div>

</div>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let status = document.getElementById('status');
let logBox = document.getElementById("logBox");

let model;
let running = false;
let lastBeepTime = 0;

// 📜 log system
function addLog(text){
    let time = new Date().toLocaleTimeString();
    let div = document.createElement("div");
    div.innerText = `${time} - ${text}`;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
}

// 🔊 beep sound
function playBeep(){
    let now = Date.now();
    if(now - lastBeepTime < 1500) return;

    lastBeepTime = now;

    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type = "square";
    osc.frequency.value = 800;
    gain.gain.value = 0.15;

    osc.start();

    setTimeout(()=> osc.stop(), 200);
}

// 📸 capture image
function captureImage(){
    let tempCanvas = document.createElement("canvas");
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    let tempCtx = tempCanvas.getContext("2d");
    tempCtx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let img = tempCanvas.toDataURL("image/png");

    let a = document.createElement("a");
    a.href = img;
    a.download = "intruder.png";
    a.click();

    addLog("Photo captured 📸");
}

// 🚀 start system
async function startSystem(){
    if(running) return;
    running = true;

    model = await cocoSsd.load();
    addLog("AI Model Loaded");

    navigator.mediaDevices.getUserMedia({ video:true })
    .then(stream => {
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            detect();
        };
    });
}

// 🛑 stop system
function stopSystem(){
    running = false;

    let stream = video.srcObject;
    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    status.innerText = "SYSTEM STATUS: STOPPED";
    status.className = "status safe";

    addLog("System stopped 🛑");
}

// 🧠 detection loop
async function detect(){
    setInterval(async ()=>{

        if(!running) return;

        const predictions = await model.detect(video);

        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(video,0,0,canvas.width,canvas.height);

        let personFound = false;

        predictions.forEach(p => {

            if(p.class === "person" && p.score > 0.6){
                personFound = true;

                ctx.strokeStyle = "red";
                ctx.lineWidth = 3;
                ctx.strokeRect(...p.bbox);

                ctx.fillStyle = "red";
                ctx.fillText("INTRUDER", p.bbox[0], p.bbox[1] - 5);
            }
        });

        if(personFound){
            status.innerText = "INTRUDER DETECTED";
            status.className = "status danger";

            playBeep();
            addLog("Intruder detected 🚨");

            captureImage();

        } else {
            status.innerText = "SYSTEM STATUS: SAFE";
            status.className = "status safe";
        }

    }, 500);
}
</script>

</body>
</html>
