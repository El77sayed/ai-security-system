<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Security System PRO</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }body{
    background: radial-gradient(circle at top, #0f172a, #000);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:950px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,255,255,0.25);
}

h1{
    text-align:center;
    margin-bottom:15px;
    color:#00f7ff;
    letter-spacing:3px;
}

.grid{
    display:grid;
    grid-template-columns: 1fr;
    gap:15px;
}

video{
    width:100%;
    border-radius:15px;
    border:2px solid #00f7ff;
    box-shadow: 0 0 25px #00f7ff;
}

.status{
    text-align:center;
    font-size:20px;
    padding:10px;
    border-radius:10px;
    background: rgba(0,0,0,0.5);
    transition:0.3s;
}

.safe{
    color:#00ff88;
}

.danger{
    color:#ff004c;
    animation: blink 0.4s infinite alternate;
}

@keyframes blink{
    from{opacity:1;}
    to{opacity:0.3;}
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00f7ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

canvas{
    display:none;
}

</style>
</head>
<body><div class="container">
    <h1>AI SECURITY SYSTEM PRO</h1><div class="grid">
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>
    <div id="status" class="status safe">SYSTEM STATUS: SAFE</div>
    <button onclick="startCamera()">START SYSTEM</button>
</div>

</div><script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let status = document.getElementById('status');

let alarm = new Audio('alarm.mp3');
alarm.loop = true;

let lastFrame = null;

function startCamera(){
    navigator.mediaDevices.getUserMedia({ video:true })
    .then(stream => {
        video.srcObject = stream;
        detectMotion();
    });
}

function detectMotion(){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    setInterval(()=>{
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        let currentFrame = ctx.getImageData(0,0,canvas.width,canvas.height);

        if(lastFrame){
            let diff = 0;

            for(let i=0;i<currentFrame.data.length;i+=50){
                diff += Math.abs(currentFrame.data[i] - lastFrame.data[i]);
            }

            if(diff > 5000){
                triggerAlarm(true);
            }else{
                triggerAlarm(false);
            }
        }

        lastFrame = currentFrame;
    },500);
}

function triggerAlarm(motion){
    if(motion){
        status.innerText = "SYSTEM STATUS: INTRUDER DETECTED";
        status.className = "status danger";
        if(alarm.paused){
            alarm.play();
        }
    }else{
        status.innerText = "SYSTEM STATUS: SAFE";
        status.className = "status safe";
        alarm.pause();
        alarm.currentTime = 0;
    }
}
</script></body>
</html>
