<script>
// 🛑 stop system
function stopSystem(){
    running = false;

    let stream = video.srcObject;
    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    status.innerText = "SYSTEM STATUS: STOPPED";
    status.className = "status safe";

    peopleCount.innerText = "0";

    addLog("System stopped 🛑");
}

// 🧠 detect
async function detect(){
    setInterval(async ()=>{

        if(!running) return;

        const predictions = await model.detect(video);

        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(video,0,0,canvas.width,canvas.height);

        let count = 0;

        predictions.forEach(p => {

            if(p.class === "person" && p.score > 0.6){
                count++;

                ctx.strokeStyle = "red";
                ctx.lineWidth = 3;
                ctx.strokeRect(...p.bbox);

                ctx.fillStyle = "red";
                ctx.fillText("INTRUDER", p.bbox[0], p.bbox[1] - 5);
            }
        });

        peopleCount.innerText = count;

        if(count > 0){
            status.innerText = "INTRUDER DETECTED";
            status.className = "status danger";

            playBeep();
            addLog("Intruder detected 🚨");

            captureImage();

        } else {
            status.innerText = "SYSTEM STATUS: SAFE";
            status.className = "status safe";
        }

    }, 500);
}
</script>
