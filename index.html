<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Security Control Room</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050b18;
    color:white;
}

/* 🔷 TOP BAR */
.header{
    text-align:center;
    padding:15px;
    font-size:22px;
    color:#00e5ff;
    letter-spacing:3px;
    border-bottom:1px solid #0ff2;
}

/* 🔷 MAIN LAYOUT */
.container{
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:15px;
    padding:15px;
}

/* 🎥 VIDEO PANEL */
.videoBox{
    position:relative;
    border:2px solid #00e5ff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 20px #00e5ff55;
}

video{
    width:100%;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

/* 📊 SIDE PANEL */
.panel{
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* CARDS */
.card{
    background:#0b1224;
    border:1px solid #00e5ff33;
    padding:10px;
    border-radius:10px;
}

.status{
    padding:10px;
    text-align:center;
    border-radius:8px;
    font-weight:bold;
}

.safe{
    background:#00c85333;
    color:#00e676;
}

.danger{
    background:#ff174433;
    color:#ff1744;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.start{ background:#00e676; }
.stop{ background:#ff1744; }

/* LOGS */
.logs{
    height:200px;
    overflow:auto;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">AI SECURITY CONTROL ROOM</div>

<div class="container">

<!-- LEFT CAMERA -->
<div class="videoBox">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<!-- RIGHT DASHBOARD -->
<div class="panel">

    <div id="status" class="status safe">SYSTEM READY</div>

    <div class="card">
        👥 People: <span id="peopleCount">0</span>
    </div>

    <div class="card">
        📸 Last Event: <span id="lastEvent">None</span>
    </div>

    <div class="buttons">
        <button class="start" onclick="startSystem()">START</button>
        <button class="stop" onclick="stopSystem()">STOP</button>
    </div>

    <div class="card logs" id="logs"></div>

</div>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let status = document.getElementById("status");
let peopleCount = document.getElementById("peopleCount");
let lastEvent = document.getElementById("lastEvent");
let logs = document.getElementById("logs");

let model;
let running = false;

let alarmOsc = null;
let audioCtx = null;

/* LOG */
function addLog(msg){
    let time = new Date().toLocaleTimeString();
    logs.innerHTML += `<div>[${time}] ${msg}</div>`;
    logs.scrollTop = logs.scrollHeight;
}

/* 🔊 ALARM */
function startAlarm(){
    if(alarmOsc) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    alarmOsc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    alarmOsc.connect(gain);
    gain.connect(audioCtx.destination);

    alarmOsc.type = "sawtooth";
    alarmOsc.frequency.value = 900;
    gain.gain.value = 0.2;

    alarmOsc.start();
}

function stopAlarm(){
    if(alarmOsc){
        alarmOsc.stop();
        alarmOsc = null;
    }
}

/* START */
async function startSystem(){
    if(running) return;
    running = true;

    model = await cocoSsd.load();
    addLog("AI Model Loaded");

    let stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;

    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        detect();
    };
}

/* STOP */
function stopSystem(){
    running = false;

    let stream = video.srcObject;
    if(stream){
        stream.getTracks().forEach(t=>t.stop());
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    status.innerText = "SYSTEM STOPPED";
    status.className = "status safe";

    peopleCount.innerText = "0";

    stopAlarm();

    addLog("System stopped");
}

/* DETECT */
async function detect(){

    setInterval(async ()=>{

        if(!running) return;

        let predictions = await model.detect(video);

        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(video,0,0);

        let count = 0;

        predictions.forEach(p=>{
            if(p.class==="person" && p.score>0.6){
                count++;

                ctx.strokeStyle="red";
                ctx.lineWidth=2;
                ctx.strokeRect(...p.bbox);
            }
        });

        peopleCount.innerText = count;

        if(count>0){
            status.innerText="INTRUDER ALERT";
            status.className="status danger";

            startAlarm();

            addLog("Intruder detected 🚨");
            lastEvent.innerText="Intruder";

        }else{
            status.innerText="SYSTEM SAFE";
            status.className="status safe";

            stopAlarm();
        }

    },500);
}
</script>

</body>
</html>
