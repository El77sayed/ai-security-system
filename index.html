<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Security System Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    text-align: center;
}

header {
    background: #111827;
    padding: 15px;
    font-size: 22px;
    color: #00ffcc;
}

video {
    width: 90%;
    max-width: 420px;
    margin-top: 20px;
    border-radius: 15px;
    border: 3px solid #00ffcc;
}

canvas {
    position: absolute;
    left: 0;
    top: 0;
}

.container {
    position: relative;
    display: inline-block;
}

.status {
    margin-top: 10px;
    color: #00ffcc;
}

.alert {
    margin-top: 15px;
    font-size: 22px;
    color: red;
    font-weight: bold;
    animation: blink 0.5s infinite alternate;
}

@keyframes blink {
    from {opacity: 1;}
    to {opacity: 0.3;}
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.soundBtn {
    background: #ffcc00;
}
</style>
</head>

<body>

<header>🚨 AI SECURITY SYSTEM PRO</header>

<div class="container">
    <video id="camera" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div class="status" id="status">Loading AI...</div>

<button class="soundBtn" onclick="enableSound()">🔊 Enable Sound</button>

<div class="alert" id="alert"></div>

<audio id="alarm">
    <source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3">
</audio>

<script>
let model;
let video = document.getElementById("camera");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let alarm = document.getElementById("alarm");
let soundEnabled = false;

function enableSound() {
    soundEnabled = true;
    alert("🔊 Sound Enabled");
}

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    return new Promise(resolve => {
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            resolve();
        };
    });
}

async function loadAI() {
    model = await cocoSsd.load();
    document.getElementById("status").innerText = "AI Active - Monitoring...";
    detect();
}

async function detect() {
    const predictions = await model.detect(video);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let personDetected = false;

    predictions.forEach(p => {
        if (p.score > 0.6) {

            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 2;
            ctx.strokeRect(...p.bbox);

            ctx.fillStyle = "#00ffcc";
            ctx.fillText(p.class, p.bbox[0], p.bbox[1]);

            if (p.class === "person") {
                personDetected = true;
            }
        }
    });

    if (personDetected) {
        document.getElementById("alert").innerText = "🚨 INTRUDER DETECTED!";

        if (soundEnabled) {
            alarm.play();
        }

    } else {
        document.getElementById("alert").innerText = "";
    }

    requestAnimationFrame(detect);
}

async function startSystem() {
    await startCamera();
    await loadAI();
}

startSystem();
</script>

</body>
</html>
