<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Security System Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    text-align: center;
}

header {
    background: #111827;
    padding: 15px;
    font-size: 22px;
    color: #00ffcc;
    border-bottom: 2px solid #00ffcc;
}

.container {
    position: relative;
    display: inline-block;
    margin-top: 20px;
}

video {
    width: 90%;
    max-width: 420px;
    border-radius: 15px;
    border: 3px solid #00ffcc;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

.status {
    margin-top: 10px;
    color: #00ffcc;
}

.alert {
    margin-top: 15px;
    font-size: 22px;
    font-weight: bold;
    color: red;
    animation: blink 0.5s infinite alternate;
}

@keyframes blink {
    from {opacity: 1;}
    to {opacity: 0.3;}
}
</style>
</head>

<body>

<header>🚨 AI SECURITY SYSTEM PRO</header>

<div class="container">
    <video id="camera" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div class="status" id="status">Loading AI...</div>
<div class="alert" id="alert"></div>

<audio id="alarm">
    <source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3">
</audio>

<script>
let model;
let video = document.getElementById("camera");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let alarm = document.getElementById("alarm");

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    return new Promise(resolve => {
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            resolve();
        };
    });
}

async function loadAI() {
    model = await cocoSsd.load();
    document.getElementById("status").innerText = "AI Active - Monitoring...";
    detect();
}

async function detect() {
    const predictions = await model.detect(video);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let personDetected = false;

    predictions.forEach(pred => {
        if (pred.score > 0.6) {

            // رسم مربع
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 2;
            ctx.strokeRect(...pred.bbox);

            // اسم الكائن
            ctx.fillStyle = "#00ffcc";
            ctx.fillText(
                pred.class + " " + Math.round(pred.score * 100) + "%",
                pred.bbox[0],
                pred.bbox[1] > 10 ? pred.bbox[1] - 5 : 10
            );

            if (pred.class === "person") {
                personDetected = true;
            }
        }
    });

    if (personDetected) {
        document.getElementById("alert").innerText = "🚨 INTRUDER DETECTED!";
        
        try {
            alarm.play();
        } catch (e) {}
    } else {
        document.getElementById("alert").innerText = "";
    }

    requestAnimationFrame(detect);
}

async function startSystem() {
    await startCamera();
    await loadAI();
}

startSystem();
</script>

</body>
</html>
