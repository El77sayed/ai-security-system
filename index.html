<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Security System</title>

<style>
body {
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

video, canvas {
    width: 640px;
    height: 480px;
    border: 2px solid white;
}

.status {
    margin-top: 10px;
    font-size: 20px;
}

.safe { color: green; }
.danger { color: red; }
</style>
</head>

<body>

<h1>AI Security System</h1>

<video id="video" autoplay muted></video>
<canvas id="canvas"></canvas>

<br><br>

<button onclick="startSystem()">Start</button>
<button onclick="stopSystem()">Stop</button>

<div id="status" class="status safe">SYSTEM STATUS: SAFE</div>
<h2>People Count: <span id="peopleCount">0</span></h2>

<audio id="alarm" src="alarm.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let status = document.getElementById("status");
let peopleCount = document.getElementById("peopleCount");
let alarm = document.getElementById("alarm");

let model;
let running = false;

cocoSsd.load().then(m => {
    model = m;
});

// تشغيل
function startSystem(){
    running = true;

    navigator.mediaDevices.getUserMedia({ video:true })
    .then(stream => {
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            detect();
        };
    });
}

// إيقاف
function stopSystem(){
    running = false;

    let stream = video.srcObject;
    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    status.innerText = "SYSTEM STATUS: STOPPED";
    status.className = "status safe";

    peopleCount.innerText = "0";
}

// صوت
function playBeep(){
    alarm.play();
}

// كشف
async function detect(){
    setInterval(async ()=>{

        if(!running) return;

        const predictions = await model.detect(video);

        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(video,0,0,canvas.width,canvas.height);

        let count = 0;

        predictions.forEach(p => {

            if(p.class === "person" && p.score > 0.6){
                count++;

                ctx.strokeStyle = "red";
                ctx.lineWidth = 3;
                ctx.strokeRect(...p.bbox);

                ctx.fillStyle = "red";
                ctx.fillText("INTRUDER", p.bbox[0], p.bbox[1] - 5);
            }
        });

        peopleCount.innerText = count;

        if(count > 0){
            status.innerText = "INTRUDER DETECTED";
            status.className = "status danger";

            playBeep();
        } else {
            status.innerText = "SYSTEM STATUS: SAFE";
            status.className = "status safe";
        }

    }, 500);
}
</script>

</body>
</html>
