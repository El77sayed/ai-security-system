<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Security System</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    text-align: center;
}

header {
    background: #111827;
    padding: 15px;
    font-size: 22px;
    color: #00ffcc;
    border-bottom: 2px solid #00ffcc;
}

video {
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
    border-radius: 15px;
    border: 3px solid #00ffcc;
}

.status {
    margin-top: 10px;
    color: #00ffcc;
}

.alert {
    margin-top: 15px;
    color: red;
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>🚨 AI Security System</header>

<video id="camera" autoplay playsinline></video>

<div class="status" id="status">Loading AI...</div>

<div class="alert" id="alert"></div>

<audio id="alarm">
    <source src="https://www.soundjay.com/buttons/sounds/beep-07.mp3">
</audio>

<script>
let model;
let video = document.getElementById("camera");

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}

// تحميل AI model
async function loadAI() {
    model = await cocoSsd.load();
    document.getElementById("status").innerText = "AI Active - Monitoring...";
    detectFrame();
}

// كشف مستمر
async function detectFrame() {
    const predictions = await model.detect(video);

    let foundPerson = false;

    predictions.forEach(pred => {
        if (pred.class === "person" && pred.score > 0.6) {
            foundPerson = true;
        }
    });

    if (foundPerson) {
        document.getElementById("alert").innerText = "🚨 Person Detected!";
        document.getElementById("alarm").play();
    } else {
        document.getElementById("alert").innerText = "";
    }

    requestAnimationFrame(detectFrame);
}

async function startSystem() {
    await startCamera();
    await loadAI();
}

startSystem();
</script>

</body>
</html>
