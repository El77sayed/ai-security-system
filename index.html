<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Smart AI Security</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

video {
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
    border: 3px solid red;
}

button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    background: red;
    color: white;
    border: none;
}
</style>
</head>

<body>

<h2>🔴 نظام أمني بالذكاء الاصطناعي</h2>

<button onclick="startSystem()">تشغيل النظام</button>

<br>

<video id="camera" autoplay muted></video>

<!-- الصوت (مهم جدًا بالاسم بتاعك) -->
<audio id="alarm" src="mixkit-morning-clock-alarm-1003.wav"></audio>

<script>
let video = document.getElementById("camera");
let alarm = document.getElementById("alarm");

let previousFrame = null;
let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

async function startSystem() {
    try {
        // تشغيل الكاميرا
        let stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        // تفعيل الصوت (مهم)
        alarm.play().then(()=>{
            alarm.pause();
            alarm.currentTime = 0;
        });

        detectMotion();

    } catch (err) {
        alert("في مشكلة في الكاميرا");
    }
}

function detectMotion() {
    setInterval(() => {

        if (video.videoWidth === 0) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        let currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);

        if (previousFrame) {
            let diff = 0;

            for (let i = 0; i < currentFrame.data.length; i += 4) {
                let delta =
                    Math.abs(currentFrame.data[i] - previousFrame.data[i]) +
                    Math.abs(currentFrame.data[i+1] - previousFrame.data[i+1]) +
                    Math.abs(currentFrame.data[i+2] - previousFrame.data[i+2]);

                if (delta > 50) diff++;
            }

            // لو في حركة
            if (diff > 5000) {
                triggerAlarm();
            }
        }

        previousFrame = currentFrame;

    }, 500);
}

function triggerAlarm() {
    alarm.currentTime = 0;
    alarm.play().catch(()=>{});
}
</script>

</body>
</html>
