<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Security System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma;
    background: #0f172a;
    color: #fff;
    text-align: center;
}

h1 {
    margin-top: 20px;
    color: #38bdf8;
}

.container {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.video-box {
    position: relative;
    border: 2px solid #38bdf8;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 25px #38bdf8;
}

video, canvas {
    width: 640px;
    height: 480px;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

.controls {
    margin-top: 20px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.start {
    background: #22c55e;
    color: white;
}

.stop {
    background: #ef4444;
    color: white;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 10px white;
}

.status {
    margin-top: 15px;
    padding: 10px;
    font-weight: bold;
    border-radius: 10px;
    display: inline-block;
}

.safe {
    background: #16a34a;
}

.danger {
    background: #dc2626;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

.info-panel {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 30px;
}

.card {
    background: #1e293b;
    padding: 15px 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px #000;
}

.log {
    margin: 20px auto;
    width: 70%;
    height: 120px;
    overflow-y: auto;
    background: #020617;
    border-radius: 10px;
    padding: 10px;
    text-align: left;
    font-size: 14px;
}
</style>
</head>

<body>

<h1>🤖 AI Security System</h1>

<div class="container">
    <div class="video-box">
        <video id="video" autoplay muted></video>
        <canvas id="canvas"></canvas>
    </div>
</div>

<div class="controls">
    <button class="start" onclick="startSystem()">Start System</button>
    <button class="stop" onclick="stopSystem()">Stop System</button>
</div>

<div id="status" class="status safe">SYSTEM STATUS: SAFE</div>

<div class="info-panel">
    <div class="card">
        👥 People Count  
        <h2 id="peopleCount">0</h2>
    </div>
</div>

<div class="log" id="log"></div>

<audio id="alarm" src="alarm.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let status = document.getElementById("status");
let peopleCount = document.getElementById("peopleCount");
let logBox = document.getElementById("log");
let alarm = document.getElementById("alarm");

let model;
let running = false;
let alarmPlaying = false;
let lastCapture = 0;

// تحميل الموديل
cocoSsd.load().then(m => {
    model = m;
    addLog("AI Model Loaded ✅");
});

function addLog(msg){
    let time = new Date().toLocaleTimeString();
    logBox.innerHTML += `[${time}] ${msg}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
}

// تشغيل النظام
function startSystem(){
    running = true;

    navigator.mediaDevices.getUserMedia({ video:true })
    .then(stream => {
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            detect();
        };
    });

    addLog("System started ▶️");
}

// إيقاف النظام
function stopSystem(){
    running = false;

    let stream = video.srcObject;
    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    status.innerText = "SYSTEM STATUS: STOPPED";
    status.className = "status safe";

    peopleCount.innerText = "0";

    addLog("System stopped 🛑");
}

// صوت الإنذار
function playBeep(){
    alarm.play();
}

// تصوير
function captureImage(){
    let img = canvas.toDataURL("image/png");
    addLog("Snapshot Captured 📸");
}

// الكشف
async function detect(){

    if(!running) return;

    const predictions = await model.detect(video);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    let count = 0;

    predictions.forEach(p => {
        if(p.class === "person" && p.score > 0.6){
            count++;

            ctx.strokeStyle = "red";
            ctx.lineWidth = 3;
            ctx.strokeRect(...p.bbox);

            ctx.fillStyle = "red";
            ctx.fillText("INTRUDER", p.bbox[0], p.bbox[1] - 5);
        }
    });

    peopleCount.innerText = count;

    if(count > 0){

        status.innerText = "INTRUDER DETECTED";
        status.className = "status danger";

        if(!alarmPlaying){
            playBeep();
            alarmPlaying = true;
        }

        let now = Date.now();
        if(now - lastCapture > 3000){
            captureImage();
            lastCapture = now;
        }

        addLog("Intruder detected 🚨");

    } else {
        status.innerText = "SYSTEM STATUS: SAFE";
        status.className = "status safe";
        alarmPlaying = false;
    }

    requestAnimationFrame(detect);
}
</script>

</body>
</html>
