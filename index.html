<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Security System PRO</title><script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script><script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script><style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: radial-gradient(circle at top, #0f172a, #000);
        color:white;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .container{
        width:95%;
        max-width:950px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius:20px;
        padding:20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 40px rgba(0,255,255,0.25);
    }

    h1{
        text-align:center;
        margin-bottom:15px;
        color:#00f7ff;
        letter-spacing:3px;
    }

    .videoBox{
        position:relative;
        width:100%;
    }

    video{
        width:100%;
        border-radius:15px;
        border:2px solid #00f7ff;
        box-shadow: 0 0 25px #00f7ff;
    }

    canvas{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
    }

    .status{
        margin-top:15px;
        text-align:center;
        font-size:20px;
        padding:10px;
        border-radius:10px;
        background: rgba(0,0,0,0.5);
    }

    .safe{ color:#00ff88; }
    .danger{ color:#ff004c; animation: blink 0.4s infinite alternate; }

    @keyframes blink{
        from{opacity:1;}
        to{opacity:0.3;}
    }

    button{
        margin-top:15px;
        padding:12px;
        width:100%;
        border:none;
        border-radius:10px;
        background:#00f7ff;
        color:black;
        font-weight:bold;
        cursor:pointer;
    }

    button:hover{ transform:scale(1.03); }
</style></head>
<body><div class="container">
    <h1>AI SECURITY SYSTEM PRO</h1><div class="videoBox">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div id="status" class="status safe">SYSTEM STATUS: SAFE</div>

<button onclick="startSystem()">START AI SYSTEM</button>

</div><script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let status = document.getElementById('status');

let model;

let alarm = new Audio("alarm.mp3");
alarm.loop = true;
let isPlaying = false;
let audioUnlocked = false;

// unlock audio (fix mobile + chrome)
document.addEventListener("click", () => {
    alarm.play().then(()=>{
        alarm.pause();
        alarm.currentTime = 0;
        audioUnlocked = true;
    }).catch(()=>{});
}, { once:true });

Notification.requestPermission();

async function loadModel(){
    model = await cocoSsd.load();
}

async function startSystem(){
    await loadModel();

    navigator.mediaDevices.getUserMedia({ video:true })
    .then(stream => {
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            detect();
        };
    });
}

function handleAlarm(personFound){
    if(personFound){
        if(!isPlaying && audioUnlocked){
            alarm.play().catch(()=>{});
            isPlaying = true;
        }
    }else{
        if(isPlaying){
            alarm.pause();
            alarm.currentTime = 0;
            isPlaying = false;
        }
    }
}

async function detect(){
    setInterval(async ()=>{
        const predictions = await model.detect(video);

        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(video,0,0,canvas.width,canvas.height);

        let personFound = false;

        predictions.forEach(p => {
            if(p.class === "person" && p.score > 0.6){
                personFound = true;

                ctx.strokeStyle = "red";
                ctx.lineWidth = 3;
                ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);

                ctx.fillStyle = "red";
                ctx.fillText("INTRUDER", p.bbox[0], p.bbox[1] - 5);
            }
        });

        handleAlarm(personFound);

        if(personFound){
            status.innerText = "SYSTEM STATUS: INTRUDER DETECTED";
            status.className = "status danger";

            if(Notification.permission === "granted"){
                new Notification("⚠️ Intruder Detected", {
                    body: "AI detected a person in restricted area"
                });
            }
        }else{
            status.innerText = "SYSTEM STATUS: SAFE";
            status.className = "status safe";
        }

    }, 500);
}
</script></body>
</html>
